name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

  services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: cinereserve_test
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

  env:
    SECRET_KEY: dummy-key-for-testing-only
    DEBUG: True
    DATABASE_URL: postgres://root:root@localhost:5432/cinereserve_test
    REDIS_URL: redis://localhost:6379/0

  steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v3
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root

    - name: Run Ruff (Linting)
      run: poetry run ruff check .

    - name: Run Ruff (Formatting Check)
      run: poetry run ruff format --check .

    - name: Check for missing migrations
      run: poetry run python manage.py makemigrations --check --dry-run

    - name: Run Pytest and Check Coverage
      run: poetry run pytest --cov-fail-under=70
