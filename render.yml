services:
  - type: web
    name: cinereserve-api
    env: docker
    plan: free
    region: ohio
    dockerContext: .
    dockerCommand: gunicorn core.wsgi:application --bind 0.0.0.0:10000 --workers 2
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cinereserve-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: cinereserve-redis
          property: connectionString

  - type: worker
    name: cinereserve-worker
    env: docker
    plan: free
    region: ohio
    dockerContext: .
    dockerCommand: celery -A core worker -l INFO
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cinereserve-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: cinereserve-redis
          property: connectionString

databases:
  - name: cinereserve-db
    plan: free
    region: ohio

redis:
  name: cinereserve-redis
  plan: free
  region: ohio